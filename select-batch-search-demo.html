<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FineDesign Select 批量搜索演示</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        --brand: #06b6d4;
        --brand-weak: #e6fffb;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: linear-gradient(180deg, #fbfcfe 0%, var(--bg) 100%);
        color: var(--text);
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      .app-shell { max-width: 1240px; margin: 0 auto; padding: 40px 24px 56px; }
      .hero { display: flex; justify-content: space-between; align-items: end; gap: 24px; margin-bottom: 24px; }
      .hero h1 { margin: 0; font-size: 34px; line-height: 1.1; }
      .hero p { margin: 10px 0 0; color: var(--muted); }
      .hero-badge, .card-badge { border-radius: 999px; background: var(--brand-weak); color: #0f766e; font-weight: 600; }
      .hero-badge { padding: 10px 14px; white-space: nowrap; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
      .card { background: var(--panel); border: 1px solid rgba(229,231,235,.96); border-radius: 16px; box-shadow: var(--shadow); padding: 22px; }
      .card-head { display: flex; justify-content: space-between; align-items: start; gap: 16px; margin-bottom: 18px; }
      .card-head h2 { margin: 0 0 8px; font-size: 20px; }
      .card-head p { margin: 0; color: var(--muted); font-size: 14px; }
      .card-badge { padding: 8px 12px; font-size: 12px; white-space: nowrap; }
      .summary { margin-top: 14px; padding: 12px 14px; border-radius: 12px; background: #f8fafc; color: #334155; font-size: 13px; }

      .select {
        position: relative;
      }

      .trigger {
        width: 100%;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 12px;
        border: 1px solid #d8dde8;
        border-radius: 4px;
        background: #fff;
        color: #8a94ab;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
      }

      .trigger .value {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .arrow { color: #4b5563; font-size: 18px; line-height: 1; }

      .dropdown {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 8px);
        z-index: 20;
        background: #fff;
        border: 1px solid #e5eaf2;
        border-radius: 8px;
        box-shadow: 0 16px 44px rgba(15, 23, 42, .12);
        overflow: hidden;
        display: none;
      }

      .select.open .dropdown { display: block; }

      .search-row {
        display: flex;
        align-items: center;
        gap: 12px;
        height: 56px;
        padding: 0 16px;
        border-bottom: 1px solid #edf1f7;
        color: #8a94ab;
        font-size: 18px;
      }

      .search-row input {
        width: 100%;
        border: 0;
        outline: none;
        font: inherit;
        color: #44506b;
      }

      .search-row input::placeholder { color: #8a94ab; }

      .option-list {
        max-height: 262px;
        overflow: auto;
      }

      .option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-top: 1px solid #f2f4f8;
        cursor: pointer;
        color: #2f3b63;
      }

      .option:first-child { border-top: 0; }
      .option:hover { background: #f7fdff; }

      .check {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        border: 1.5px solid #cfd6e4;
        border-radius: 3px;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 12px;
      }

      .option.active .check {
        border-color: var(--brand);
        background: var(--brand);
      }

      .option .text {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty {
        padding: 28px 16px;
        color: #94a3b8;
        text-align: center;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #edf1f7;
        font-size: 12px;
        color: #64748b;
      }

      .header strong { color: #334155; }

      .tip { color: #94a3b8; }

      .hidden-title {
        max-width: 100%;
        display: inline-block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .hero { flex-direction: column; align-items: start; }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <h1>FineDesign Select 批量搜索演示</h1>
          <p>展开态按 Figma 还原；收起态保持不变。搜索支持批量粘贴，通过换行识别，且必须全部命中。</p>
        </div>
        <div class="hero-badge">80 条数据 · 首屏 30 条</div>
      </header>

      <section class="grid">
        <article class="card">
          <div class="card-head">
            <div>
              <h2>单选筛选器</h2>
              <p>搜索命中结果后单选；展示文本过长时，hover 看完整 Title。</p>
            </div>
            <div class="card-badge">单选 · 批量搜索</div>
          </div>
          <div class="select" data-type="single">
            <button class="trigger" type="button">
              <span class="value"><span class="placeholder">请选择</span></span>
              <span class="arrow">⌄</span>
            </button>
            <div class="dropdown">
              <div class="search-row">⌕ <input class="search-input" placeholder="搜索：支持批量粘贴，通过换行识别" /></div>
              <div class="header"><strong>已显示 <span data-count>0</span> / <span data-total>80</span></strong><span class="tip">按回车后逐行过滤</span></div>
              <div class="option-list"></div>
            </div>
          </div>
          <div class="summary">当前选择：未选择</div>
        </article>

        <article class="card">
          <div class="card-head">
            <div>
              <h2>多选筛选器</h2>
              <p>支持全选、逐项勾选；搜索与多选状态互不影响。</p>
            </div>
            <div class="card-badge">多选 · 批量搜索</div>
          </div>
          <div class="select" data-type="multi">
            <button class="trigger" type="button">
              <span class="value"><span class="placeholder">请选择</span></span>
              <span class="arrow">⌄</span>
            </button>
            <div class="dropdown">
              <div class="search-row">⌕ <input class="search-input" placeholder="搜索：支持批量粘贴，通过换行识别" /></div>
              <div class="header"><strong>已显示 <span data-count>0</span> / <span data-total>80</span></strong><span class="tip">按回车后逐行过滤</span></div>
              <div class="option-list"></div>
            </div>
          </div>
          <div class="summary">当前选择：未选择</div>
        </article>
      </section>
    </main>

    <script>
      const PAGE_SIZE = 30;
      const ALL_OPTIONS = Array.from({ length: 80 }, (_, index) => {
        const number = String(index + 1).padStart(2, '0');
        const label = `示例文本 ${number} - 业务筛选项名称`;
        return { value: `option-${number}`, label, title: label };
      });

      function parseKeywords(value) {
        return value
          .split(/\r?\n+/)
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function filterOptions(keywords) {
        if (!keywords.length) return ALL_OPTIONS;
        return ALL_OPTIONS.filter((option) => {
          const content = `${option.label} ${option.value} ${option.title}`.toLowerCase();
          return keywords.every((keyword) => content.includes(keyword.toLowerCase()));
        });
      }

      function createTagText(values) {
        if (!values.length) return '未选择';
        return values.join('、');
      }

      function createDemo(root) {
        const isMultiple = root.dataset.type === 'multi';
        const trigger = root.querySelector('.trigger');
        const dropdown = root.querySelector('.dropdown');
        const input = root.querySelector('.search-input');
        const list = root.querySelector('.option-list');
        const countEl = root.querySelector('[data-count]');
        const totalEl = root.querySelector('[data-total]');
        const summary = root.parentElement.querySelector('.summary');
        const valueEl = root.querySelector('.value');

        let open = false;
        let searchValue = '';
        let visibleCount = PAGE_SIZE;
        let selected = isMultiple ? [] : null;

        function getFiltered() {
          return filterOptions(parseKeywords(searchValue));
        }

        function updateTrigger() {
          if (isMultiple) {
            valueEl.innerHTML = selected.length
              ? `<span class="hidden-title" title="${selected.map((item) => item.title).join('、')}">${selected.slice(0, 2).map((item) => item.label).join('、')}${selected.length > 2 ? ` +${selected.length - 2}` : ''}</span>`
              : '<span class="placeholder">请选择</span>';
            summary.textContent = `当前选择：${createTagText(selected.map((item) => item.label))}`;
          } else {
            valueEl.innerHTML = selected
              ? `<span class="hidden-title" title="${selected.title}">${selected.label}</span>`
              : '<span class="placeholder">请选择</span>';
            summary.textContent = `当前选择：${selected ? selected.label : '未选择'}`;
          }
        }

        function render() {
          const filtered = getFiltered();
          const visible = filtered.slice(0, visibleCount);
          totalEl.textContent = filtered.length;
          countEl.textContent = visible.length;
          list.innerHTML = '';

          if (isMultiple) {
            const allChecked = filtered.length > 0 && filtered.every((option) => selected.some((item) => item.value === option.value));
            const allRow = document.createElement('div');
            allRow.className = 'option' + (allChecked ? ' active' : '');
            allRow.innerHTML = `<div class="check">${allChecked ? '✓' : ''}</div><div class="text" title="全选">全选</div>`;
            allRow.addEventListener('click', () => {
              selected = allChecked ? [] : filtered.slice();
              updateTrigger();
              render();
            });
            list.appendChild(allRow);
          }

          if (!visible.length) {
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = '没有找到匹配结果';
            list.appendChild(empty);
            return;
          }

          visible.forEach((option) => {
            const row = document.createElement('div');
            const checked = isMultiple
              ? selected.some((item) => item.value === option.value)
              : selected && selected.value === option.value;
            row.className = 'option' + (checked ? ' active' : '');
            row.title = option.title;
            row.innerHTML = `<div class="check">${checked ? '✓' : ''}</div><div class="text">${option.label}</div>`;
            row.addEventListener('click', () => {
              if (isMultiple) {
                selected = checked
                  ? selected.filter((item) => item.value !== option.value)
                  : selected.concat(option);
              } else {
                selected = option;
                open = false;
                root.classList.remove('open');
              }
              updateTrigger();
              render();
            });
            list.appendChild(row);
          });
        }

        input.addEventListener('input', (event) => {
          searchValue = event.target.value;
          visibleCount = PAGE_SIZE;
          render();
        });

        list.addEventListener('scroll', () => {
          const filtered = getFiltered();
          const reachedBottom = list.scrollTop + list.clientHeight >= list.scrollHeight - 24;
          if (!reachedBottom || visibleCount >= filtered.length) return;
          visibleCount = Math.min(visibleCount + PAGE_SIZE, filtered.length);
          render();
        });

        trigger.addEventListener('click', () => {
          open = !open;
          root.classList.toggle('open', open);
          if (open) {
            visibleCount = PAGE_SIZE;
            render();
            setTimeout(() => input.focus(), 0);
          }
        });

        updateTrigger();
        render();
      }

      document.querySelectorAll('.select').forEach(createDemo);
      document.addEventListener('click', (event) => {
        document.querySelectorAll('.select').forEach((root) => {
          if (!root.contains(event.target)) root.classList.remove('open');
        });
      });
    </script>
  </body>
</html>
