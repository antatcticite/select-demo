<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, 'PingFang SC', system-ui, sans-serif;
    font-size: 13px;
    color: #1f2937;
    background: #fff;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  h2 { font-size: 14px; font-weight: 600; }
  p  { font-size: 12px; color: #6b7280; line-height: 1.5; }
  button {
    width: 100%; height: 34px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: #0091b5; color: #fff;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { font-size: 12px; min-height: 16px; text-align: center; color: #6b7280; }
  .ok  { color: #059669; }
  .err { color: #dc2626; }
</style>
</head>
<body>
  <h2>Select States Generator</h2>
  <p>生成 G1 自定义值 & G2 精确搜索，单选+多选，共 4 组 × 5 个状态。</p>
  <button id="btn">生成帧</button>
  <p class="status" id="status"></p>
  <script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    btn.addEventListener('click', () => {
      btn.disabled = true;
      status.textContent = '生成中…';
      status.className = 'status';
      parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
    });
    window.addEventListener('message', e => {
      const msg = e.data && e.data.pluginMessage;
      if (!msg) return;
      btn.disabled = false;
      if (msg.type === 'done') {
        status.textContent = '✅ 完成！';
        status.className = 'status ok';
      }
      if (msg.type === 'error') {
        status.textContent = '❌ ' + msg.message;
        status.className = 'status err';
      }
    });
  </script>
</body>
</html>
